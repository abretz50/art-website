<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arturo Tapia-Minchez | Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/global.css" />
</head>
<body data-depth="0">
  <div class="mobile-topbar" data-mobile-topbar></div>
  <div class="site-shell">
    <div data-site-nav></div>
    <main>
      <section class="page page--light">
        <div class="page-inner">
          <span class="kicker">Contact</span>
          <h1>Contact</h1>
          <p class="lead">Use this page for inquiries without listing personal information publicly. Connect it later to Formspree, Netlify Forms, EmailJS, or another form service when ready.</p>
          <div class="panel">
            <form onsubmit="event.preventDefault(); alert('Form connected placeholder: add your form service to make this send.');">
              <div class="field-grid">
                <label>Name<input type="text" name="name" placeholder="Your name" required></label>
                <label>Email<input type="email" name="email" placeholder="your@email.com" required></label>
              </div>
              <div class="field-grid">
                <label>Inquiry Type
                  <select name="type">
                    <option>General Inquiry</option>
                    <option>Commission</option>
                    <option>Performance / Collaboration</option>
                    <option>Press / Presenter Request</option>
                  </select>
                </label>
                <label>Subject<input type="text" name="subject" placeholder="Subject line"></label>
              </div>
              <label>Message<textarea name="message" placeholder="Write your message here..."></textarea></label>
              <div class="intro-actions" style="margin-top: 6px;">
                <button class="primary-btn" type="submit">Send Message</button>
              </div>
              <div class="submit-note">This is the finished design placeholder. Connect a real form handler before publishing live contact functionality.</div>
            </form>
          </div>
        </div>
      </section>
      <footer class="footer" data-site-footer></footer>
    </main>
  </div>
  <script src="assets/js/site.js"></script>
</body>
</html>
